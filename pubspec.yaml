name: app_gestionsupportdecours
description: Application de gestion de documents académiques - ISI

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  firebase_storage: ^12.3.0

  # State Management
  provider: ^6.1.1

  # HTTP (API REST alternative)
  http: ^1.2.0

  # PDF
  flutter_pdfview: ^1.3.2
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_filex: ^4.3.4

  # File Picker
  file_picker: ^8.0.0

  # URL Launcher
  url_launcher: ^6.2.4

  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # Utils
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpeg
